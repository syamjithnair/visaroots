<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Currency Exchange Dashboard</title>
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; }
        body {
            background: linear-gradient(45deg, #49a09d, #5f2c82);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: 300;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-container img {
            max-width: 320px;
            height: auto;
            filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.3));
        }

        /* Adjusted width for 5 columns */
        .container { width: 1000px; z-index: 1; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.4);
            border-radius: 15px;
            background-color: rgba(255,255,255,0.1);
        }

        th, td {
            padding: 20px 15px;
            color: #fff;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        thead th { 
            background-color: #55608f; 
            font-weight: 600; 
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1.5px;
        }

        tbody tr:hover { background-color: rgba(255,255,255,0.2); transition: 0.2s; }
        
        .currency-name { font-weight: 600; text-align: left; padding-left: 30px; }
        .market-rate { opacity: 0.9; font-family: monospace; font-size: 1.1rem; }
        .buy-col { color: #2ecc71; font-weight: bold; background-color: rgba(46, 204, 113, 0.1); }
        .sale-col { color: #e74c3c; font-weight: bold; background-color: rgba(231, 76, 60, 0.1); }
        .trend-up { color: #2ecc71; }
        .trend-down { color: #e74c3c; }

        .status-bar { color: white; text-align: center; margin-bottom: 10px; font-size: 0.8rem; letter-spacing: 1px; }

        /* Ticker */
        .ticker-wrap {
            position: fixed; bottom: 0; width: 100%; overflow: hidden;
            height: 3rem; background-color: rgba(0, 0, 0, 0.6); display: flex; align-items: center;
        }
        .ticker { display: inline-block; white-space: nowrap; animation: ticker 50s linear infinite; padding-left: 100%; }
        .ticker__item { display: inline-block; padding: 0 2rem; font-size: 0.9rem; color: white; }
        @keyframes ticker { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }
    </style>
</head>
