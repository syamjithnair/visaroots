<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Currency Exchange Dashboard</title>
    <style>
        /* Base & Background */
        html, body { height: 100%; margin: 0; overflow: hidden; }
        body {
            background: linear-gradient(45deg, #49a09d, #5f2c82);
            font-family: sans-serif;
            font-weight: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Logo Section */
        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-container img {
            max-width: 350px;
            height: auto;
            filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.3));
        }

        /* Dashboard Container */
        .container { width: 900px; z-index: 1; }
        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            border-radius: 12px;
        }
        th, td {
            padding: 18px;
            background-color: rgba(255,255,255,0.2);
            color: #fff;
            text-align: center; /* Centered for better readability of rates */
        }
        thead th { 
            background-color: #55608f; 
            font-weight: 600; 
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
        tbody tr:hover { background-color: rgba(255,255,255,0.3); transition: 0.3s; }
        
        .currency-name { font-weight: bold; text-align: left; }
        .buy-col { color: #afffaf; font-weight: bold; } /* Greenish for Buy */
        .sale-col { color: #ffbaba; font-weight: bold; } /* Reddish for Sale */

        /* Loading & Status */
        .status-bar { color: white; text-align: center; margin-bottom: 10px; font-size: 0.8rem; opacity: 0.8; }

        /* Ticker Styling */
        .ticker-wrap {
            position: fixed;
            bottom: 0;
            width: 100%;
            overflow: hidden;
            height: 3rem;
            background-color: rgba(0, 0, 0, 0.5); 
            display: flex;
            align-items: center;
        }
        .ticker {
            display: inline-block;
            white-space: nowrap;
            animation: ticker 40s linear infinite;
            padding-left: 100%;
        }
        .ticker__item {
            display: inline-block;
            padding: 0 2.5rem;
            font-size: 0.9rem;
            color: white;
        }
        .ticker__item b { color: #49a09d; }

        @keyframes ticker {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="https://static.wixstatic.com/media/ed9bfe_d74412127c58485495e82381f71c7960~mv2.png/v1/fill/w_780,h_146,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/ed9bfe_d74412127c58485495e82381f71c7960~mv2.png" alt="Logo">
    </div>

    <div id="status" class="status-bar">Initializing live INR feeds...</div>
    
    <table>
        <thead>
            <tr>
                <th style="text-align: left;">Currency</th>
                <th>Market Rate (INR)</th>
                <th>Buy Rate (Market -1)</th>
                <th>Sale Rate (Market +1)</th>
            </tr>
        </thead>
        <tbody id="rates-body">
            </tbody>
    </table>
</div>

<div class="ticker-wrap">
    <div class="ticker" id="ticker-content"></div>
</div>
