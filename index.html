<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Currency Dashboard</title>
    <style>
        /* Base Styles */
        html, body { height: 100%; margin: 0; overflow: hidden; }
        body {
            background: linear-gradient(45deg, #49a09d, #5f2c82);
            font-family: sans-serif;
            font-weight: 100;
            display: flex;
            flex-direction: column; /* Stack table and scroll */
            align-items: center;
            justify-content: center;
        }

        /* Table Styling */
        .container { width: 800px; z-index: 1; }
        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            border-radius: 10px;
        }
        th, td {
            padding: 15px;
            background-color: rgba(255,255,255,0.2);
            color: #fff;
            text-align: left;
        }
        thead th { background-color: #55608f; font-weight: 600; }
        tbody tr:hover { background-color: rgba(255,255,255,0.3); }
        
        /* Loading Text */
        .loading-text { color: white; text-align: center; margin-bottom: 15px; font-size: 0.9rem; opacity: 0.8; }

        /* --- Ticker / Scroll Styling --- */
        .ticker-wrap {
            position: fixed;
            bottom: 0;
            width: 100%;
            overflow: hidden;
            height: 3rem;
            background-color: rgba(0, 0, 0, 0.4); 
            padding-left: 100%;
            box-sizing: content-box;
            display: flex;
            align-items: center;
        }
