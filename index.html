<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Exchange Dashboard</title>
    <style>
        /* Layout & Background */
        html, body { height: 100%; margin: 0; overflow: hidden; }
        body {
            background: linear-gradient(45deg, #49a09d, #5f2c82);
            font-family: sans-serif;
            font-weight: 300;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Logo Section */
        .logo-container { text-align: center; margin-bottom: 25px; }
        .logo-container img {
            max-width: 320px;
            filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.3));
        }

        /* Dashboard Table */
        .container { width: 850px; z-index: 1; }
        table {
            width: 100%;
            border-collapse: collapse;
            box-shadow: 0 0 30px rgba(0,0,0,0.4);
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
            overflow: hidden;
        }
        th, td {
            padding: 20px;
            color: #ffffff;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        thead th { 
            background: #55608f; 
            font-weight: 600; 
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1.5px;
        }
        
        .rate-cell { font-family: monospace; font-size: 1.2rem; }
        .currency-label { font-weight: bold; text-align: left; padding-left: 40px; }
        
        tbody tr:hover { background: rgba(255,255,255,0.2); transition: 0.2s; }
        
        /* Date/Time Status Bar */
        .status-bar { 
            color: white; 
            margin-bottom: 12px; 
            font-size: 0.9rem; 
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
            width: 100%;
            opacity: 0.9;
        }

        /* Ticker */
        .ticker-wrap {
            position: fixed; bottom: 0; width: 100%; overflow: hidden;
            height: 3rem; background: rgba(0, 0, 0, 0.5); display: flex; align-items: center;
        }
        .ticker { display: inline-block; white-space: nowrap; animation: ticker 40s linear infinite; }
        .ticker__item { display: inline-block; padding: 0 2rem; color: white; font-size: 0.9rem; }
        @keyframes ticker { 0% { transform: translate3d(100%, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="https://static.wixstatic.com/media/ed9bfe_d74412127c58485495e82381f71c7960~mv2.png/v1/fill/w_780,h_146,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/ed9bfe_d74412127c58485495e82381f71c7960~mv2.png" alt="Logo">
    </div>

    <div class="status-bar">
        <span id="live-indicator">● LIVE MARKET RATES</span>
        <span id="date-time">Loading date and time...</span>
    </div>
    
    <table>
        <thead>
            <tr>
                <th style="text-align: left; padding-left: 40px;">Currency</th>
                <th>Market Rate (INR)</th>
                <th>Buy Rate</th>
                <th>Sale Rate</th>
            </tr>
        </thead>
        <tbody id="rates-body">
            <tr><td colspan="4" style="padding: 50px;">Connecting to secure data feed...</td></tr>
        </tbody>
    </table>
</div>

<div class="ticker-wrap">
    <div class="ticker" id="ticker-content"></div>
</div>

<script>
    async function fetchRates() {
        try {
            const response = await fetch("https://open.er-api.com/v6/latest/INR");
            const data = await response.json();
            
            if (data.result === "success") {
                const rates = data.rates;
                const currencies = ['USD', 'EUR', 'GBP', 'AED', 'SAR', 'OMR', 'KWD'];
                const tbody = document.getElementById('rates-body');
                
                // Update Date and Time
                const now = new Date();
                const dateOptions = { day: '2-digit', month: 'short', year: 'numeric' };
                const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit' };
                document.getElementById('date-time').innerText = 
                    now.toLocaleDateString('en-GB', dateOptions) + " | " + now.toLocaleTimeString([], timeOptions);
                
                let rows = '';
                currencies.forEach(cur => {
                    const market = 1 / rates[cur];
                    rows += `
                        <tr>
                            <td class="currency-label">${getSymbol(cur)} ${cur}</td>
                            <td class="rate-cell">${market.toFixed(2)}</td>
                            <td class="rate-cell">${(market - 1).toFixed(2)}</td>
                            <td class="rate-cell">${(market + 1).toFixed(2)}</td>
                        </tr>`;
                });
                tbody.innerHTML = rows;

                const ticker = document.getElementById('ticker-content');
                ticker.innerHTML = currencies.map(cur => `
                    <div class="ticker__item"><b>${cur}/INR:</b> ${(1/rates[cur]).toFixed(2)}</div>
                `).join('');

            }
        } catch (e) {
            document.getElementById('date-time').innerText = "Connection lost. Retrying...";
        }
    }

    function getSymbol(cur) {
        const symbols = { 'USD': '$', 'EUR': '€', 'GBP': '£', 'AED': 'د.إ', 'SAR': '﷼', 'OMR': 'ر.ع.', 'KWD': 'د.ك' };
        return symbols[cur] || '';
    }

    fetchRates();
    // Auto refresh every 60 seconds
    setInterval(fetchRates, 60000);
</script>

</body>
</html>
