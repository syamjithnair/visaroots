<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Currency Rates</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background: #f4f7f6; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 350px; }
        h2 { margin-top: 0; color: #333; font-size: 1.2rem; }
        .rate-box { border-top: 1px solid #eee; margin-top: 1rem; padding-top: 1rem; }
        .rate-item { display: flex; justify-content: space-between; margin-bottom: 0.5rem; color: #555; }
        .status { font-size: 0.8rem; color: #888; margin-top: 1rem; }
        #loading { color: #3498db; }
    </style>
</head>
<body>

<div class="card">
    <h2>USD Exchange Rates</h2>
    <div id="loading">Fetching latest rates...</div>
    <div id="rates-container" class="rate-box" style="display:none;">
        <div class="rate-item"><span>EUR:</span> <b id="EUR">--</b></div>
        <div class="rate-item"><span>GBP:</span> <b id="GBP">--</b></div>
        <div class="rate-item"><span>JPY:</span> <b id="JPY">--</b></div>
        <div class="rate-item"><span>CAD:</span> <b id="CAD">--</b></div>
        <p class="status">Last updated: <span id="time">--</span></p>
    </div>
</div>

<script>
    // Free API endpoint (No key required for basic 'latest' info on some providers)
    const apiURL = "https://open.er-api.com/v6/latest/USD";

    async function fetchRates() {
        try {
            const response = await fetch(apiURL);
            const data = await response.json();

            if (data.result === "success") {
                // Update the UI
                document.getElementById('EUR').innerText = data.rates.EUR.toFixed(2);
                document.getElementById('GBP').innerText = data.rates.GBP.toFixed(2);
                document.getElementById('JPY').innerText = data.rates.JPY.toFixed(2);
                document.getElementById('CAD').innerText = data.rates.CAD.toFixed(2);
                
                document.getElementById('time').innerText = new Date(data.time_last_update_utc).toLocaleString();
                
                // Hide loading, show rates
                document.getElementById('loading').style.display = 'none';
                document.getElementById('rates-container').style.display = 'block';
            }
        } catch (error) {
            document.getElementById('loading').innerText = "Error loading rates.";
            console.error("API Error:", error);
        }
    }

    // Run on page load
    fetchRates();
</script>

</body>
</html>
