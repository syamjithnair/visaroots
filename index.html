<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Currency Dashboard</title>
    <style>
        /* Base Styles */
        html, body { height: 100%; margin: 0; overflow: hidden; }
        body {
            background: linear-gradient(45deg, #49a09d, #5f2c82);
            font-family: sans-serif;
            font-weight: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Logo Styling */
        .logo-container {
            text-align: center;
            margin-bottom: 30px; /* Space between logo and table */
        }
        .logo-container img {
            max-width: 400px; /* Adjust size as needed */
            height: auto;
            filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.3)); /* Makes logo pop */
        }

        /* Table Styling */
        .container { width: 800px; z-index: 1; }
        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            border-radius: 10px;
        }
        th, td {
            padding: 15px;
            background-color: rgba(255,255,255,0.2);
            color: #fff;
            text-align: left;
        }
        thead th { background-color: #55608f; font-weight: 600; }
        tbody tr:hover { background-color: rgba(255,255,255,0.3); }
        
        /* Loading Text */
        .loading-text { color: white; text-align: center; margin-bottom: 10px; font-size: 0.8rem; opacity: 0.7; }

        /* Ticker Styling */
        .ticker-wrap {
            position: fixed;
            bottom: 0;
            width: 100%;
            overflow: hidden;
            height: 3rem;
            background-color: rgba(0, 0, 0, 0.4); 
            padding-left: 100%;
            display: flex;
            align-items: center;
        }
        .ticker {
            display: inline-block;
            white-space: nowrap;
            animation: ticker 30s linear infinite;
        }
        .ticker__item {
            display: inline-block;
            padding: 0 2rem;
            font-size: 1rem;
            color: white;
            font-weight: bold;
        }
        .ticker__item span { font-weight: 100; color: #49a09d; margin-right: 5px; }

        @keyframes ticker {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="https://static.wixstatic.com/media/ed9bfe_d74412127c58485495e82381f71c7960~mv2.png/v1/fill/w_780,h_146,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/ed9bfe_d74412127c58485495e82381f71c7960~mv2.png" alt="Company Logo">
    </div>

    <div id="loading" class="loading-text">Synchronizing data...</div>
    
    <table>
        <thead>
            <tr>
                <th>Currency (Base INR)</th>
                <th>Symbol</th>
                <th>Rate</th>
                
            </tr>
        </thead>
        <tbody id="rates-body"></tbody>
    </table>
</div>

<div class="ticker-wrap">
    <div class="ticker" id="ticker-content"></div>
</div>

<script>
    const apiURL = "https://open.er-api.com/v6/latest/USD";

    async function fetchRates() {
        try {
            const response = await fetch(apiURL);
            const data = await response.json();
            if (data.result === "success") {
                const rates = data.rates;
                const mainCurrencies = ['EUR', 'GBP', 'JPY', 'CAD', 'AUD', 'CHF'];
                const tickerCurrencies = Object.keys(rates).slice(0, 20);

                const tbody = document.getElementById('rates-body');
                tbody.innerHTML = '';
                mainCurrencies.forEach(cur => {
                    tbody.innerHTML += `<tr><td>${cur}</td><td>${rates[cur].toFixed(4)}</td><td>${getSymbol(cur)}</td></tr>`;
                });

                const ticker = document.getElementById('ticker-content');
                ticker.innerHTML = '';
                tickerCurrencies.forEach(cur => {
                    ticker.innerHTML += `<div class="ticker__item"><span>USD/${cur}</span> ${rates[cur].toFixed(2)}</div>`;
                });

                document.getElementById('loading').innerText = "Last Update: " + new Date().toLocaleTimeString();
            }
        } catch (e) {
            document.getElementById('loading').innerText = "Connection error.";
        }
    }

    function getSymbol(cur) {
        const symbols = { 'EUR': '€', 'GBP': '£', 'JPY': '¥', 'CAD': '$', 'AUD': '$', 'CHF': 'Fr' };
        return symbols[cur] || '';
    }

    fetchRates();
</script>

</body>
</html>
