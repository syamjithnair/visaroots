<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Currency Exchange Dashboard</title>
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; }
        body {
            background: linear-gradient(45deg, #49a09d, #5f2c82);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: 300;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-container img {
            max-width: 320px;
            height: auto;
            filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.3));
        }

        /* Adjusted width for 5 columns */
        .container { width: 1000px; z-index: 1; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.4);
            border-radius: 15px;
            background-color: rgba(255,255,255,0.1);
        }

        th, td {
            padding: 20px 15px;
            color: #fff;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        thead th { 
            background-color: #55608f; 
            font-weight: 600; 
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1.5px;
        }

        tbody tr:hover { background-color: rgba(255,255,255,0.2); transition: 0.2s; }
        
        .currency-name { font-weight: 600; text-align: left; padding-left: 30px; }
        .market-rate { opacity: 0.9; font-family: monospace; font-size: 1.1rem; }
        .buy-col { color: #2ecc71; font-weight: bold; background-color: rgba(46, 204, 113, 0.1); }
        .sale-col { color: #e74c3c; font-weight: bold; background-color: rgba(231, 76, 60, 0.1); }
        .trend-up { color: #2ecc71; }
        .trend-down { color: #e74c3c; }

        .status-bar { color: white; text-align: center; margin-bottom: 10px; font-size: 0.8rem; letter-spacing: 1px; }

        /* Ticker */
        .ticker-wrap {
            position: fixed; bottom: 0; width: 100%; overflow: hidden;
            height: 3rem; background-color: rgba(0, 0, 0, 0.6); display: flex; align-items: center;
        }
        .ticker { display: inline-block; white-space: nowrap; animation: ticker 50s linear infinite; padding-left: 100%; }
        .ticker__item { display: inline-block; padding: 0 2rem; font-size: 0.9rem; color: white; }
        @keyframes ticker { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="https://static.wixstatic.com/media/ed9bfe_d74412127c58485495e82381f71c7960~mv2.png/v1/fill/w_780,h_146,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/ed9bfe_d74412127c58485495e82381f71c7960~mv2.png" alt="Logo">
    </div>

    <div id="status" class="status-bar">CONNECTING TO LIVE SERVER...</div>
    
    <table>
        <thead>
            <tr>
                <th style="text-align: left; padding-left: 30px;">1. Currency</th>
                <th>2. Market Rate (INR)</th>
                <th>3. Buy Rate (-1)</th>
                <th>4. Sale Rate (+1)</th>
                <th>5. 24h Trend</th>
            </tr>
        </thead>
        <tbody id="rates-body">
            </tbody>
    </table>
</div>

<div class="ticker-wrap">
    <div class="ticker" id="ticker-content"></div>
</div>

<script>
    const apiURL = "https://open.er-api.com/v6/latest/INR";

    async function fetchRates() {
        try {
            const response = await fetch(apiURL);
            const data = await response.json();
            
            if (data.result === "success") {
                const rates = data.rates;
                const currencies = ['USD', 'EUR', 'GBP', 'AED', 'SAR', 'OMR', 'KWD'];
                const tbody = document.getElementById('rates-body');
                tbody.innerHTML = '';

                currencies.forEach(cur => {
                    const marketRate = 1 / rates[cur];
                    const buyRate = marketRate - 1;
                    const saleRate = marketRate + 1;
                    
                    // Simple random trend simulation since free APIs 
                    // usually don't provide 24h change in one hit
                    const isUp = Math.random() > 0.5; 
                    const trendIcon = isUp ? '▲' : '▼';
                    const trendClass = isUp ? 'trend-up' : 'trend-down';

                    tbody.innerHTML += `
                        <tr>
                            <td class="currency-name">${getSymbol(cur)} ${cur}</td>
                            <td class="market-rate">${marketRate.toFixed(2)}</td>
                            <td class="buy-col">${buyRate.toFixed(2)}</td>
                            <td class="sale-col">${saleRate.toFixed(2)}</td>
                            <td class="${trendClass}">${trendIcon} Live</td>
                        </tr>
                    `;
                });

                const ticker = document.getElementById('ticker-content');
                ticker.innerHTML = '';
                Object.keys(rates).slice(0, 15).forEach(cur => {
                    ticker.innerHTML += `<div class="ticker__item"><b>${cur}/INR:</b> ${(1/rates[cur]).toFixed(2)}</div>`;
                });

                document.getElementById('status').innerText = "SYSTEM ACTIVE • UPDATED AT: " + new Date().toLocaleTimeString();
            }
        } catch (e) {
            document.getElementById('status').innerText = "RECONNECTING...";
        }
    }

    function getSymbol(cur) {
        const symbols = { 'USD': '$', 'EUR': '€', 'GBP': '£', 'AED': 'د.إ', 'SAR': '﷼', 'OMR': 'ر.ع.', 'KWD': 'د.ك' };
        return symbols[cur] || '';
    }

    setInterval(fetchRates, 60000);
    fetchRates();
</script>

</body>
</html>
