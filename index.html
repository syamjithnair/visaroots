<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Exchange Dashboard</title>
    <style>
        /* Layout & Background */
        html, body { height: 100%; margin: 0; overflow: hidden; }
        body {
            background: linear-gradient(45deg, #49a09d, #5f2c82);
            font-family: sans-serif;
            font-weight: 300;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Logo Section */
        .logo-container { text-align: center; margin-bottom: 25px; }
        .logo-container img {
            max-width: 320px;
            filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.3));
        }

        /* Uniform Table Styling */
        .container { width: 1000px; z-index: 1; }
        table {
            width: 100%;
            border-collapse: collapse;
            box-shadow: 0 0 30px rgba(0,0,0,0.4);
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
            overflow: hidden;
        }
        th, td {
            padding: 20px;
            color: #ffffff; /* Uniform White Text */
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        thead th { 
            background: #55608f; 
            font-weight: 600; 
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1.5px;
        }
        
        /* Removed green/red fonts - using uniform styling */
        .rate-cell { font-family: monospace; font-size: 1.1rem; }
        .currency-label { font-weight: bold; text-align: left; padding-left: 30px; }
        
        tbody tr:hover { background: rgba(255,255,255,0.2); transition: 0.2s; }
        
        .status-text { color: white; margin-bottom: 8px; font-size: 0.8rem; opacity: 0.7; }

        /* Ticker */
        .ticker-wrap {
            position: fixed; bottom: 0; width: 100%; overflow: hidden;
            height: 3rem; background: rgba(0, 0, 0, 0.5); display: flex; align-items: center;
        }
        .ticker { display: inline-block; white-space: nowrap; animation: ticker 50s linear infinite; }
        .ticker__item { display: inline-block; padding: 0 2rem; color: white; font-size: 0.9rem; }
        @keyframes ticker { 0% { transform: translate3d(100%, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="https://static.wixstatic.com/media/ed9bfe_d74412127c58485495e82381f71c7960~mv2.png/v1/fill/w_780,h_146,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/ed9bfe_d74412127c58485495e82381f71c7960~mv2.png" alt="Logo">
    </div>

    <div id="status" class="status-text">Fetching Live INR Rates...</div>
    
    <table>
        <thead>
            <tr>
                <th style="text-align: left; padding-left: 30px;">Currency</th>
                <th>Market Rate</th>
                <th>Buy Rate</th>
                <th>Sale Rate</th>
                <th>Last Updated</th>
            </tr>
        </thead>
        <tbody id="rates-body">
            <tr><td colspan="5" style="padding: 40px;">Initializing secure data connection...</td></tr>
        </tbody>
    </table>
</div>

<div class="ticker-wrap">
    <div class="ticker" id="ticker-content"></div>
</div>

<script>
    async function fetchRates() {
        try {
            const response = await fetch("https://open.er-api.com/v6/latest/INR");
            const data = await response.json();
            
            if (data.result === "success") {
                const rates = data.rates;
                const currencies = ['USD', 'EUR', 'GBP', 'AED', 'SAR', 'OMR', 'KWD'];
                const tbody = document.getElementById('rates-body');
                const timeString = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                let rows = '';
                currencies.forEach(cur => {
                    const market = 1 / rates[cur];
                    rows += `
                        <tr>
                            <td class="currency-label">${getSymbol(cur)} ${cur}</td>
                            <td class="rate-cell">${market.toFixed(2)}</td>
                            <td class="rate-cell">${(market - 1).toFixed(2)}</td>
                            <td class="rate-cell">${(market + 1).toFixed(2)}</td>
                            <td style="opacity: 0.6; font-size: 0.8rem;">${timeString}</td>
                        </tr>`;
                });
                tbody.innerHTML = rows;

                const ticker = document.getElementById('ticker-content');
                ticker.innerHTML = currencies.map(cur => `
                    <div class="ticker__item"><b>${cur}/INR:</b> ${(1/rates[cur]).toFixed(2)}</div>
                `).join('');

                document.getElementById('status').innerText = "Market Status: Live";
            }
        } catch (e) {
            document.getElementById('status').innerText = "Status: Connection Error. Retrying...";
        }
    }

    function getSymbol(cur) {
        const symbols = { 'USD': '$', 'EUR': '€', 'GBP': '£', 'AED': 'د.إ', 'SAR': '﷼', 'OMR': 'ر.ع.', 'KWD': 'د.ك' };
        return symbols[cur] || '';
    }

    fetchRates();
    setInterval(fetchRates, 60000);
</script>

</body>
</html>
