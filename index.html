<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Currency Dashboard</title>
    <style>
        /* Base Styles */
        html, body { height: 100%; margin: 0; overflow: hidden; }
        body {
            background: linear-gradient(45deg, #49a09d, #5f2c82);
            font-family: sans-serif;
            font-weight: 100;
            display: flex;
            flex-direction: column; /* Stack table and scroll */
            align-items: center;
            justify-content: center;
        }

        /* Table Styling */
        .container { width: 800px; z-index: 1; }
        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            border-radius: 10px;
        }
        th, td {
            padding: 15px;
            background-color: rgba(255,255,255,0.2);
            color: #fff;
            text-align: left;
        }
        thead th { background-color: #55608f; font-weight: 600; }
        tbody tr:hover { background-color: rgba(255,255,255,0.3); }
        
        /* Loading Text */
        .loading-text { color: white; text-align: center; margin-bottom: 15px; font-size: 0.9rem; opacity: 0.8; }

        /* --- Ticker / Scroll Styling --- */
        .ticker-wrap {
            position: fixed;
            bottom: 0;
            width: 100%;
            overflow: hidden;
            height: 3rem;
            background-color: rgba(0, 0, 0, 0.4); 
            padding-left: 100%;
            box-sizing: content-box;
            display: flex;
            align-items: center;
        }

        .ticker {
            display: inline-block;
            height: 3rem;
            line-height: 3rem;  
            white-space: nowrap;
            padding-right: 100%;
            box-sizing: content-box;
            -webkit-animation-iteration-count: infinite; 
            animation-iteration-count: infinite;
            -webkit-animation-timing-function: linear;
            animation-timing-function: linear;
            -webkit-animation-name: ticker;
            animation-name: ticker;
            -webkit-animation-duration: 30s;
            animation-duration: 30s;
        }

        .ticker__item {
            display: inline-block;
            padding: 0 2rem;
            font-size: 1rem;
            color: white;
            font-weight: bold;
        }

        .ticker__item span { font-weight: 100; color: #49a09d; margin-right: 5px; }

        @keyframes ticker {
            0% { transform: translate3d(0, 0, 0); visibility: visible; }
            100% { transform: translate3d(-100%, 0, 0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="loading" class="loading-text">Connecting to global markets...</div>
    <table>
        <thead>
            <tr>
                <th>Currency (Base USD)</th>
                <th>Rate</th>
                <th>Symbol</th>
            </tr>
        </thead>
        <tbody id="rates-body">
            </tbody>
    </table>
</div>

<div class="ticker-wrap">
    <div class="ticker" id="ticker-content">
        </div>
</div>

<script>
    const apiURL = "https://open.er-api.com/v6/latest/USD";

    async function fetchRates() {
        try {
            const response = await fetch(apiURL);
            const data = await response.json();

            if (data.result === "success") {
                const rates = data.rates;
                const mainCurrencies = ['EUR', 'GBP', 'JPY', 'CAD', 'AUD', 'CHF'];
                const tickerCurrencies = Object.keys(rates).slice(0, 25); // Show first 25 for scroll

                // Update Table
                const tbody = document.getElementById('rates-body');
                tbody.innerHTML = '';
                mainCurrencies.forEach(cur => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${cur}</td>
                            <td>${rates[cur].toFixed(4)}</td>
                            <td>${getSymbol(cur)}</td>
                        </tr>`;
                });

                // Update Ticker (Scroll)
                const ticker = document.getElementById('ticker-content');
                ticker.innerHTML = '';
                tickerCurrencies.forEach(cur => {
                    ticker.innerHTML += `
                        <div class="ticker__item">
                            <span>USD/${cur}</span> ${rates[cur].toFixed(2)}
                        </div>`;
                });

                document.getElementById('loading').innerText = "Market Open • Last Update: " + new Date().toLocaleTimeString();
            }
        } catch (error) {
            document.getElementById('loading').innerText = "Offline: Check connection.";
        }
    }

    function getSymbol(cur) {
        const symbols = { 'EUR': '€', 'GBP': '£', 'JPY': '¥', 'CAD': '$', 'AUD': '$', 'CHF': 'Fr' };
        return symbols[cur] || '';
    }

    fetchRates();
</script>

</body>
</html>
